keywords:
  - "mitochondrial transfer"
  - "mitochondria transplantation"
  - "intercellular mitochondria transfer"
  - "platelet-rich plasma"

report_hour: 6        # 毎朝何時に実行するか（JST = UTC+9）
top_n: 2              # 各キーワードから何本報告するか
max_results: 50       # 各キーワードで取得する最大件数（20→50に増加）
reported_expiry_days: 90  # 報告済み論文の有効期限（日）。経過後は再候補に

# 5本目：直近1年の話題論文（キーワード横断・専用検索）
trending:
  enabled: true
  within_months: 12     # 直近何ヶ月以内
  max_results: 40       # Trending専用検索の取得件数（多めに）
  citation_weight: 0.2
  recency_weight: 0.6
  velocity_weight: 0.2  # 月あたり引用数
