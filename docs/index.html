<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="text-center px-4">
    <div class="bg-indigo-600 text-white rounded-2xl px-10 py-8 inline-block shadow-lg mb-8">
      <h1 class="text-3xl font-bold">Paper Tracker</h1>
      <p class="text-indigo-200 mt-2">毎朝 Top 3 論文を自動報告</p>
    </div>
    <p class="text-gray-500 text-lg">まだ論文が取得されていません。</p>
    <p class="text-gray-400 mt-2">GitHub Actions が初回実行されると、ここに論文が表示されます。</p>
    <p class="text-gray-400 mt-1 text-sm">手動実行: Actions タブ → "Daily Paper Report" → "Run workflow"</p>
  </div>
</body>
</html>
