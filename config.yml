keywords:
  - "mitochondrial transfer"
  - "PRP"

report_hour: 6        # 毎朝何時に実行するか（JST = UTC+9）
top_n: 2              # 各キーワードから何本報告するか
max_results: 20       # 各キーワードで取得する最大件数

# 5本目：直近1年の話題論文（キーワード横断）
trending:
  enabled: true
  within_months: 12   # 直近何ヶ月以内
  citation_weight: 0.2
  recency_weight: 0.6
  velocity_weight: 0.2  # 月あたり引用数
